<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candid Stream Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal-container">
        <header class="terminal-header">
            <div class="status">
                <span class="dot"></span>
                <h1>CANDID NEWS STREAM</h1>
            </div>
            <button id="connectBtn">Connect</button>
        </header>
        <div id="terminal" class="terminal-body">
            <div class="line system">-- System Ready. Click Connect to start --</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
